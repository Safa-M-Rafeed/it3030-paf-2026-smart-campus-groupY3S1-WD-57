spring:
  application:
    name: smart-campus-api
  
  # ADD THIS SECTION
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_campus
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 15MB


app:
  upload:
    dir: uploads/
    
server:
  port: 8081  # Keep it as 8081